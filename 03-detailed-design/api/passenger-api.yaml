openapi: 3.0.3
info:
  title: 12306旅客管理 API
  description: |
    12306旅客管理系统 - 旅客管理模块接口文档
    基于API First设计，AI辅助生成
  version: 1.0.0
  contact:
    name: 12306 Dev Team

servers:
  - url: http://localhost:8080/api
    description: 开发环境
  - url: https://api.12306.com
    description: 生产环境

tags:
  - name: 旅客管理
    description: 旅客（常用联系人）相关接口

paths:
  /passengers:
    get:
      tags:
        - 旅客管理
      summary: 获取旅客列表
      description: 获取当前用户的常用旅客列表，支持分页
      operationId: listPassengers
      parameters:
        - name: page
          in: query
          description: 页码，从1开始
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: size
          in: query
          description: 每页条数
          schema:
            type: integer
            default: 10
            maximum: 50
        - name: sort
          in: query
          description: 排序字段
          schema:
            type: string
            default: createdAt
        - name: order
          in: query
          description: 排序方向
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PassengerListResponse'
        '401':
          description: 未授权
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags:
        - 旅客管理
      summary: 创建旅客
      description: 添加新的常用旅客，支持成人/儿童/学生/残军
      operationId: createPassenger
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PassengerRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PassengerResponse'
        '400':
          description: 参数校验失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '409':
          description: 证件号重复
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /passengers/{id}:
    get:
      tags:
        - 旅客管理
      summary: 获取旅客详情
      description: 获取旅客详细信息，包含乘车记录
      operationId: getPassengerDetail
      parameters:
        - name: id
          in: path
          required: true
          description: 旅客ID
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PassengerDetailResponse'
        '404':
          description: 旅客不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags:
        - 旅客管理
      summary: 更新旅客
      description: 更新旅客信息，证件号不可修改
      operationId: updatePassenger
      parameters:
        - name: id
          in: path
          required: true
          description: 旅客ID
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PassengerUpdateRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PassengerResponse'
        '400':
          description: 参数校验失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '404':
          description: 旅客不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - 旅客管理
      summary: 删除旅客
      description: 删除旅客，有未完成订单时不可删除
      operationId: deletePassenger
      parameters:
        - name: id
          in: path
          required: true
          description: 旅客ID
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: 删除成功
        '404':
          description: 旅客不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: 有未完成订单，不可删除
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /passengers/{id}/default:
    put:
      tags:
        - 旅客管理
      summary: 设置默认旅客
      description: 将指定旅客设为默认乘车人
      operationId: setDefaultPassenger
      parameters:
        - name: id
          in: path
          required: true
          description: 旅客ID
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 设置成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PassengerResponse'
        '404':
          description: 旅客不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /passengers/validate:
    post:
      tags:
        - 旅客管理
      summary: 校验旅客信息
      description: 预校验旅客信息（不保存），用于表单实时校验
      operationId: validatePassenger
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PassengerRequest'
      responses:
        '200':
          description: 校验通过
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                    example: true
        '400':
          description: 校验失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

components:
  schemas:
    PassengerRequest:
      type: object
      required:
        - name
        - idType
        - idNumber
        - passengerType
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 20
          description: 姓名
          example: 张三
        gender:
          type: string
          enum: [M, F]
          description: 性别
        birthDate:
          type: string
          format: date
          description: 出生日期 YYYY-MM-DD
          example: "1990-01-01"
        idType:
          type: string
          enum: [ID_CARD, PASSPORT, HK_MACAU, TAIWAN]
          description: 证件类型
        idNumber:
          type: string
          minLength: 5
          maxLength: 20
          description: 证件号
          example: "110101199001011234"
        phone:
          type: string
          pattern: '^1[3-9]\d{9}$'
          description: 手机号
          example: "13800138000"
        passengerType:
          type: string
          enum: [ADULT, CHILD, STUDENT, DISABLED_SOLDIER]
          description: 旅客类型
        schoolName:
          type: string
          description: 学校名称（学生必填）
        studentNo:
          type: string
          description: 学号（学生必填）
        discountStation:
          type: string
          description: 优惠区间（学生必填）
        studentValidUntil:
          type: string
          format: date
          description: 学生有效期（学生必填）
        disabledSoldierNo:
          type: string
          description: 残疾证号（残军必填）
        disabledSoldierValidUntil:
          type: string
          format: date
          description: 残军证有效期（残军必填）

    PassengerUpdateRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 20
          description: 姓名
        gender:
          type: string
          enum: [M, F]
          description: 性别
        birthDate:
          type: string
          format: date
          description: 出生日期
        phone:
          type: string
          pattern: '^1[3-9]\d{9}$'
          description: 手机号
        idType:
          type: string
          readOnly: true
        idNumber:
          type: string
          readOnly: true
        passengerType:
          type: string
          readOnly: true
        schoolName:
          type: string
        studentNo:
          type: string
        discountStation:
          type: string
        studentValidUntil:
          type: string
          format: date
        disabledSoldierNo:
          type: string
        disabledSoldierValidUntil:
          type: string
          format: date

    PassengerResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: 旅客ID
        name:
          type: string
          description: 姓名
          example: 张三
        gender:
          type: string
          description: 性别
        birthDate:
          type: string
          format: date
          description: 出生日期
        idType:
          type: string
          description: 证件类型
          example: ID_CARD
        idNumber:
          type: string
          description: 证件号（脱敏）
          example: "110101**********1234"
        idNumberFull:
          type: string
          description: 证件号（全量）
          example: "110101199001011234"
        phone:
          type: string
          description: 手机号
          example: "138****8000"
        passengerType:
          type: string
          description: 旅客类型
          example: ADULT
        passengerTypeName:
          type: string
          description: 旅客类型中文名
          example: 成人
        certificationStatus:
          type: string
          description: 认证状态
          example: VERIFIED
        certificationStatusName:
          type: string
          description: 认证状态中文名
          example: 已认证
        isDefault:
          type: boolean
          description: 是否默认
        createdAt:
          type: string
          format: date-time
          description: 创建时间
        updatedAt:
          type: string
          format: date-time
          description: 更新时间

    PassengerDetailResponse:
      allOf:
        - $ref: '#/components/schemas/PassengerResponse'
        - type: object
          properties:
            schoolName:
              type: string
              description: 学校名称
            studentNo:
              type: string
              description: 学号
            discountStation:
              type: string
              description: 优惠区间
            studentValidUntil:
              type: string
              format: date
              description: 学生有效期
            disabledSoldierNo:
              type: string
              description: 残疾证号
            disabledSoldierValidUntil:
              type: string
              format: date
              description: 残军证有效期
            travelRecords:
              type: array
              description: 近3个月乘车记录
              items:
                $ref: '#/components/schemas/TravelRecord'

    TravelRecord:
      type: object
      properties:
        orderId:
          type: integer
          format: int64
          description: 订单ID
        trainNo:
          type: string
          description: 车次号
          example: "G101"
        departureStation:
          type: string
          description: 出发站
        arrivalStation:
          type: string
          description: 到达站
        departureTime:
          type: string
          format: date-time
          description: 出发时间
        seatType:
          type: string
          description: 席别
        seatNo:
          type: string
          description: 座位号
        ticketStatus:
          type: string
          description: 车票状态

    PassengerListResponse:
      type: object
      properties:
        code:
          type: integer
          example: 200
        message:
          type: string
          example: success
        data:
          type: object
          properties:
            list:
              type: array
              items:
                $ref: '#/components/schemas/PassengerResponse'
            pagination:
              type: object
              properties:
                page:
                  type: integer
                  description: 当前页
                size:
                  type: integer
                  description: 每页条数
                total:
                  type: integer
                  description: 总条数
                totalPages:
                  type: integer
                  description: 总页数

    ErrorResponse:
      type: object
      properties:
        code:
          type: integer
          description: 错误码
          example: 404
        message:
          type: string
          description: 错误信息
          example: 旅客不存在
        data:
          type: object
          description: 错误详情

    ValidationErrorResponse:
      type: object
      properties:
        code:
          type: integer
          description: 错误码
          example: 400
        message:
          type: string
          description: 错误信息
          example: 参数校验失败
        data:
          type: object
          properties:
            errors:
              type: array
              items:
                type: object
                properties:
                  field:
                    type: string
                    description: 错误字段
                    example: idNumber
                  message:
                    type: string
                    description: 错误信息
                    example: 身份证号应为18位

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT Token认证

security:
  - BearerAuth: []
