version: "3.8"

services:
  # ===== MySQL 数据库 =====
  mysql:
    image: mysql:8.0
    container_name: railway-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: railway_system
      MYSQL_CHARSET: utf8mb4
      TZ: Asia/Shanghai
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../../database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ../../database/stations_data.sql:/docker-entrypoint-initdb.d/02-stations.sql
      - ../../database/trains_import.sql:/docker-entrypoint-initdb.d/03-trains.sql
      - ../../database/train_stops_import.sql:/docker-entrypoint-initdb.d/04-train-stops.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ===== Redis 缓存 =====
  redis:
    image: redis:7-alpine
    container_name: railway-redis
    restart: always
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ===== Spring Boot 后端 =====
  backend:
    build:
      context: ../../04-implementation/backend
      dockerfile: ../../06-deployment/docker/Dockerfile.backend
    container_name: railway-backend
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/railway_system?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      TZ: Asia/Shanghai
    ports:
      - "8080:8080"

  # ===== Vue 前端 + Nginx =====
  frontend:
    build:
      context: ../../04-implementation/frontend
      dockerfile: ../../06-deployment/docker/Dockerfile.frontend
    container_name: railway-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  mysql_data:
  redis_data:
